name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
          TAURI_CONFIG: '{"build":{"beforeBuildCommand":"bun run build:ci"}}'
          VITE_SPOTIFY_CLIENT_ID: ${{ secrets.VITE_SPOTIFY_CLIENT_ID }}
          VITE_DISCOGS_TOKEN: ${{ secrets.VITE_DISCOGS_TOKEN }}
          VITE_REDIRECT_URI_DEV: "http://127.0.0.1:3000/auth"
          VITE_REDIRECT_URI_DESKTOP: "beardify://auth"
          VITE_REDIRECT_URI_PROD: "https://beardify.netlify.app/auth"
        run: bun run tauri build

      - name: Package release & generate update manifest
        run: bun run scripts/package-release.ts

      - name: Get version
        id: version
        shell: bash
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            releases/${{ steps.version.outputs.version }}/beardify_${{ steps.version.outputs.version }}_setup.exe
            releases/${{ steps.version.outputs.version }}/beardify_${{ steps.version.outputs.version }}_x64.msi
            releases/${{ steps.version.outputs.version }}/beardify_${{ steps.version.outputs.version }}.exe
            releases/${{ steps.version.outputs.version }}/beardify_${{ steps.version.outputs.version }}_x64-setup.nsis.zip
            releases/${{ steps.version.outputs.version }}/beardify_${{ steps.version.outputs.version }}_x64-setup.nsis.zip.sig
            releases/${{ steps.version.outputs.version }}/latest.json
