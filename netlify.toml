[build]
  command = "bun run build && cp -r node_modules/flag-icons/flags/4x3/. dist/flags"
  publish = "dist"

[functions]
  directory = "netlify/functions"

[dev]
  command = "bun run dev -- --port 3001"
  port = 3000
  targetPort = 3001

[[redirects]]
  from = "/*"
  status = 200
  to = "/index.html"
